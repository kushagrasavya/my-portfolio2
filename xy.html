<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <style>
        /* --- Base Reset & Typography --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Main Layout --- */
        .wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 8px;
            gap: 8px;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: 300px;
            background-color: #121212;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            padding: 20px 24px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-links li {
            color: #b3b3b3;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .nav-links li:hover, .nav-links li.active {
            color: #ffffff;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            background: linear-gradient(180deg, #2a2a2a 0%, #121212 100%);
            border-radius: 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-buttons span {
            display: inline-block;
            width: 32px;
            height: 32px;
            background-color: rgba(0,0,0,0.7);
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            margin-right: 8px;
            color: #b3b3b3;
            cursor: not-allowed;
        }

        .profile-btn {
            background-color: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .content-section {
            padding: 24px;
        }

        .content-section h2 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        /* --- Card Grid --- */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: #181818;
            padding: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .card:hover {
            background-color: #282828;
        }

        .card-img {
            width: 100%;
            aspect-ratio: 1;
            background-color: #333;
            border-radius: 4px;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-desc {
            font-size: 14px;
            color: #b3b3b3;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* --- Bottom Player --- */
        .player {
            height: 90px;
            background-color: #000000;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 30%;
        }

        .album-art {
            width: 56px;
            height: 56px;
            background-color: #333;
            border-radius: 4px;
        }

        .track-info h4 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .track-info p {
            font-size: 12px;
            color: #b3b3b3;
        }

        .player-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 40%;
        }

        .control-buttons {
            display: flex;
            gap: 16px;
            margin-bottom: 8px;
            align-items: center;
        }

        .play-btn {
            width: 32px;
            height: 32px;
            background-color: #fff;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
        }

        .playback-bar {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #b3b3b3;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background-color: #4d4d4d;
            border-radius: 2px;
            cursor: pointer;
        }

        .progress {
            width: 30%;
            height: 100%;
            background-color: #fff;
            border-radius: 2px;
        }

        .volume-controls {
            width: 30%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        .volume-bar {
            width: 100px;
            height: 4px;
            background-color: #4d4d4d;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="logo">
                🟢 Spotify
            </div>
            <ul class="nav-links">
                <li class="active">🏠 Home</li>
                <li>🔍 Search</li>
                <li>📚 Your Library</li>
            </ul>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-buttons">
                    <span>&lt;</span>
                    <span>&gt;</span>
                </div>
                <button class="profile-btn">User</button>
            </header>

            <div class="content-section">
                <h2>Good evening</h2>
                <div class="card-grid">
                    <div class="card">
                        <div class="card-img" style="background: linear-gradient(135deg, #450af5, #c4efd9);"></div>
                        <div class="card-title">Liked Songs</div>
                        <div class="card-desc">Your favorite tracks.</div>
                    </div>
                    <div class="card">
                        <div class="card-img" style="background: linear-gradient(135deg, #ff4b2b, #ff416c);"></div>
                        <div class="card-title">Daily Mix 1</div>
                        <div class="card-desc">Made for you.</div>
                    </div>
                    <div class="card">
                        <div class="card-img" style="background: linear-gradient(135deg, #00b09b, #96c93d);"></div>
                        <div class="card-title">Discover Weekly</div>
                        <div class="card-desc">New music updated every Monday.</div>
                    </div>
                    <div class="card">
                        <div class="card-img" style="background: linear-gradient(135deg, #8E2DE2, #4A00E0);"></div>
                        <div class="card-title">Release Radar</div>
                        <div class="card-desc">Catch up on the latest releases.</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="player">
        <div class="now-playing">
            <div class="album-art" style="background: linear-gradient(135deg, #ff4b2b, #ff416c);"></div>
            <div class="track-info">
                <h4>Song Title</h4>
                <p>Artist Name</p>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <span>⏮</span>
                <div class="play-btn">▶</div>
                <span>⏭</span>
            </div>
            <div class="playback-bar">
                <span>1:23</span>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <span>3:45</span>
            </div>
        </div>

        <div class="volume-controls">
            <span>🔊</span>
            <div class="volume-bar">
                <div class="progress" style="width: 70%;"></div>
            </div>
        </div>
    </footer>

</body>
</html>
